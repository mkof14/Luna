name: Uptime Monitor

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

jobs:
  uptime:
    runs-on: ubuntu-latest
    steps:
      - name: Check uptime
        id: check
        env:
          UPTIME_BASE_URL: ${{ secrets.UPTIME_BASE_URL }}
          UPTIME_HEALTH_PATH: ${{ secrets.UPTIME_HEALTH_PATH }}
        run: |
          if [ -z "$UPTIME_BASE_URL" ]; then
            echo "UPTIME_BASE_URL is not set. Skipping."
            echo "status=skipped" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          HEALTH_PATH="${UPTIME_HEALTH_PATH:-/api/health}"
          APP_URL="${UPTIME_BASE_URL%/}/"
          HEALTH_URL="${UPTIME_BASE_URL%/}${HEALTH_PATH}"

          echo "Checking $APP_URL"
          curl --fail --silent --show-error --max-time 20 "$APP_URL" >/dev/null

          echo "Checking $HEALTH_URL"
          curl --fail --silent --show-error --max-time 20 "$HEALTH_URL" >/dev/null

          echo "status=ok" >> "$GITHUB_OUTPUT"

      - name: Notify Telegram on failure
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          UPTIME_BASE_URL: ${{ secrets.UPTIME_BASE_URL }}
          GITHUB_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [ -z "$TELEGRAM_BOT_TOKEN" ] || [ -z "$TELEGRAM_CHAT_ID" ]; then
            echo "Telegram secrets are not set. Skipping Telegram alert."
            exit 0
          fi

          MESSAGE="Luna uptime monitor failed for ${UPTIME_BASE_URL}. Run: ${GITHUB_RUN_URL}"
          curl --silent --show-error --fail \
            -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            --data-urlencode "text=${MESSAGE}"

