name: Post Deploy Smoke

on:
  workflow_dispatch:
    inputs:
      base_url:
        description: "Deployed app URL (e.g. https://your-app.vercel.app)"
        required: true
        type: string

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run post-deploy smoke
        env:
          SMOKE_BASE_URL: ${{ inputs.base_url }}
        run: npm run smoke:deploy

